name: Update News
on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ရေးခွင့်ပေးခြင်း
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install feedparser beautifulsoup4 requests
      - name: Fetch news data
        run: python fetch_news.py
      - name: Commit and Push
        run: |
          git config --global user.name 'NewsBot'
          git config --global user.email 'bot@news.com'
          git add news.json
          git commit -m "Auto Update News: $(date)" || echo "No changes to commit"
          git push
