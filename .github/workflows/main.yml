name: Update News
on:
  schedule:
    - cron: '*/30 * * * *' # မိနစ် ၃၀ တစ်ခါ run မည်
  workflow_dispatch: # လက်နဲ့နှိပ်ပြီး run လို့ရအောင်လုပ်ခြင်း

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Repository ထဲကို news.json ပြန်သိမ်းဖို့ ခွင့်ပြုချက်
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip' # နောက်တစ်ခါ run ရင် မြန်အောင် cache လုပ်ခြင်း

      - name: Install dependencies
        run: |
          pip install feedparser beautifulsoup4 requests lxml

      - name: Fetch news data
        run: python fetch_news.py

      - name: Commit and Push
        run: |
          git config --global user.name 'NewsBot'
          git config --global user.email 'bot@news.com'
          git add news.json
          # အပြောင်းအလဲရှိမှသာ commit လုပ်ရန်
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto Update News: $(date)" && git push)
